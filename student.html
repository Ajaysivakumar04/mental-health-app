<!DOCTYPE html>
<html>
<head>
    <title>Student Check-in</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main center">

    <h1>Daily Check-in 🌿</h1>
    <p class="subtext">Take a moment for yourself. This will only take a minute.</p>

    <div class="checkin-box">

        <label>How stressed do you feel today?</label>
        <input type="number" min="1" max="5">

        <label>How well did you sleep last night?</label>
        <input type="number" placeholder="Hours of sleep">

        <label>How focused were you today?</label>
        <input type="number" min="1" max="5">

        <label>What’s your mood right now?</label>
        <input type="text" placeholder="Happy, tired, anxious...">

        <button onclick="submitCheckin()">Check in 💙</button>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
