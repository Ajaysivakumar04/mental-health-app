<!DOCTYPE html>
<html>
<head>
    <title>Student Check-in</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 PROTECTION -->
<script>
const role = localStorage.getItem("userRole");
if (!role) {
    window.location.href = "login.html";
}
</script>

<div class="main center">

    <h1>Daily Check-in 🌿</h1>
    <p>Welcome, <span id="username"></span></p>
    <p class="subtext">Take a moment for yourself. This will only take a minute.</p>

    <div class="checkin-box">

        <div class="form-group">
            <label>How stressed do you feel today?</label><br>
            <input type="number" min="1" max="5">
        </div>

        <div class="form-group">
            <label>How well did you sleep last night?</label><br>
            <input type="number" placeholder="Hours of sleep">
        </div>

        <div class="form-group">
            <label>How focused were you today?</label><br>
            <input type="number" min="1" max="5">
        </div>

        <div class="form-group">
            <label>What’s your mood right now?</label><br>
            <input type="text" placeholder="Happy, tired, anxious...">
        </div>

        <br>
        <button onclick="submitCheckin()">Check in 💙</button>

    </div>

    <br>

    <!-- 🚪 LOGOUT -->
    <button onclick="logout()">Logout</button>

</div>

<script src="script.js"></script>

<script>
/* 👤 Username */
const name = localStorage.getItem("userName");
if (name) {
    document.getElementById("username").innerText = name;
}

/* 🚪 Logout */
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

</body>
</html>
