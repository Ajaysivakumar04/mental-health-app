<!DOCTYPE html>
<html>
<head>
    <title>Peer Support</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 PROTECTION -->
<script>
const role = localStorage.getItem("userRole");
if (!role) {
    window.location.href = "login.html";
}
</script>

<div class="main">

    <h1>Peer Support</h1>
    <p>Welcome, <span id="username"></span></p>
    <p class="subtext">Share your thoughts and support others anonymously</p>

    <!-- CREATE POST -->
    <div class="form-group">
        <textarea id="postInput" placeholder="Share your thoughts..." rows="3"></textarea>
        <br><br>
        <button onclick="post()">Post</button>
    </div>

    <!-- POSTS -->
    <div id="postsContainer">

        <div class="post" data-id="1">
            <p>I feel stressed about exams</p>
            <button onclick="reply()">Reply</button>
            <button onclick="report()">Report</button>
            <button onclick="like(this)" class="like-btn">🤍 Like <span>0</span></button>
            <p class="likedBy"></p>
        </div>

        <div class="post" data-id="2">
            <p>Not able to focus while studying</p>
            <button onclick="reply()">Reply</button>
            <button onclick="report()">Report</button>
            <button onclick="like(this)" class="like-btn">🤍 Like <span>0</span></button>
            <p class="likedBy"></p>
        </div>

    </div>

    <br>
    <button onclick="logout()">Logout</button>

</div>

<script>

/* 👤 Username */
const name = localStorage.getItem("userName");
if (name) {
    document.getElementById("username").innerText = name;
}

/* 📝 Post */
function post() {
    const input = document.getElementById("postInput");
    const text = input.value;

    if (!text) {
        alert("Write something first!");
        return;
    }

    const container = document.getElementById("postsContainer");
    const id = Date.now();

    const newPost = document.createElement("div");
    newPost.className = "post";
    newPost.setAttribute("data-id", id);

    newPost.innerHTML = `
        <p>${text}</p>
        <button onclick="reply()">Reply</button>
        <button onclick="report()">Report</button>
        <button onclick="like(this)" class="like-btn">🤍 Like <span>0</span></button>
        <p class="likedBy"></p>
    `;

    container.prepend(newPost);
    input.value = "";
}

/* 💬 Reply */
function reply() {
    const message = prompt("Type your reply:");
    if (message) {
        alert("Reply sent: " + message);
    }
}

/* 🚨 Report */
function report() {
    const confirmReport = confirm("Are you sure to report this post?");
    if (confirmReport) {
        alert("Reported successfully!");
    }
}

/* ❤️ LIKE SYSTEM WITH STORAGE */
function like(btn) {

    const post = btn.closest(".post");
    const postId = post.getAttribute("data-id");
    const user = localStorage.getItem("userName");

    let likesData = JSON.parse(localStorage.getItem("likes")) || {};

    if (!likesData[postId]) {
        likesData[postId] = [];
    }

    let users = likesData[postId];
    let countSpan = btn.querySelector("span");

    if (users.includes(user)) {
        // UNLIKE
        users = users.filter(u => u !== user);
        btn.classList.remove("liked");
    } else {
        // LIKE
        users.push(user);
        btn.classList.add("liked");
    }

    likesData[postId] = users;
    localStorage.setItem("likes", JSON.stringify(likesData));

    updatePost(post, btn, users);
}

/* 🔄 UPDATE UI */
function updatePost(post, btn, users) {

    let count = users.length;
    let countSpan = btn.querySelector("span");

    countSpan.innerText = count;

    if (users.includes(localStorage.getItem("userName"))) {
        btn.innerHTML = `❤️ Like <span>${count}</span>`;
    } else {
        btn.innerHTML = `🤍 Like <span>${count}</span>`;
    }

    // Show who liked
    let likedText = post.querySelector(".likedBy");
    if (count > 0) {
        likedText.innerText = "Liked by: " + users.join(", ");
    } else {
        likedText.innerText = "";
    }
}

/* 🔁 LOAD LIKES ON PAGE LOAD */
window.onload = function() {
    let likesData = JSON.parse(localStorage.getItem("likes")) || {};

    document.querySelectorAll(".post").forEach(post => {
        const postId = post.getAttribute("data-id");
        const btn = post.querySelector(".like-btn");

        if (likesData[postId]) {
            updatePost(post, btn, likesData[postId]);
        }
    });
}

/* 🚪 Logout */
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}

</script>

</body>
</html>
