<!DOCTYPE html>
<html>
<head>
    <title>Peer Support</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<script>
const isLoggedIn = localStorage.getItem("loggedIn");
if (!isLoggedIn) {
    window.location.href = "login.html";
}
</script>

<div class="main">

    <h1>Peer Support</h1>
    <p>Welcome, <span id="username"></span></p>

    <div class="form-group">
        <textarea id="postInput"></textarea>
        <button onclick="post()">Post</button>
    </div>

    <div class="post">
        <p>I feel stressed about exams</p>
        <button onclick="reply()">Reply</button>
        <button onclick="report()">Report</button>
        <button onclick="like(this)">🤍 Like <span>0</span></button>
        <p class="likedBy"></p>
    </div>

    <button onclick="logout()">Logout</button>

</div>

<script>
document.getElementById("username").innerText =
    localStorage.getItem("userName");

function post() {
    alert("Posted!");
}

function reply() {
    alert("Reply sent!");
}

function report() {
    alert("Reported!");
}

function like(btn) {
    let count = btn.querySelector("span");
    let val = parseInt(count.innerText);

    if (btn.classList.contains("liked")) {
        btn.classList.remove("liked");
        val--;
        btn.innerHTML = `🤍 Like <span>${val}</span>`;
    } else {
        btn.classList.add("liked");
        val++;
        btn.innerHTML = `❤️ Like <span>${val}</span>`;
    }
}

function logout() {
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("userName");
    localStorage.removeItem("userRole");
    window.location.href = "login.html";
}
</script>

</body>
</html>
