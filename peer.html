<!DOCTYPE html>
<html>
<head>
    <title>Peer Support</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main">

    <h1>Peer Support </h1>
    <p class="subtext">A safe space to share, listen, and support each other 💙</p>

    <!-- Create Post -->
    <div class="form-group">
        <textarea placeholder="What's on your mind today?" rows="3"></textarea>
        <br><br>
        <button onclick="post()">Share anonymously 💬</button>
    </div>

    <!-- Posts -->
    <div class="post">
        <p> I feel stressed about exams lately…</p>
        <br>
        <button>💬 Reply</button>
        <button>🚩 Report</button>
    </div>

    <div class="post">
        <p>📚 Not able to focus while studying. It’s frustrating.</p>
        <br>
        <button>💬 Reply</button>
        <button>🚩 Report</button>
    </div>

</div>

<script>
function post(){
    alert("Your post has been shared 💙");
}
</script>

</body>
</html>
